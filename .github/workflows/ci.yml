name: Backend CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16

        env:
          POSTGRES_DB: mousebase
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/mousebase

      SECRET_KEY: github-actions-secret-key

      GEMINI_API_KEY: test

      EMBEDDING_MODEL: text-embedding-004
      EMBEDDING_DIMENSIONS: 768

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify Installation
        run: |
          python --version
          pip --version
          ruff --version
          black --version
          pytest --version
          alembic --version

      - name: Lint with Ruff
        run: ruff check .

      - name: Check Formatting
        run: black --check .

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Verify PostgreSQL & pgvector
        run: |
          echo "PostgreSQL version:"
          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d mousebase \
            -c "SELECT version();"

          echo ""
          echo "Installed extensions:"
          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d mousebase \
            -c "\dx"

          echo ""
          echo "Available vector extension:"
          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d mousebase \
            -c "SELECT * FROM pg_available_extensions WHERE name='vector';"

      - name: Run Database Migrations
        run: alembic upgrade head

      - name: Create Development Project
        run: python -m scripts.create_dev_project

      - name: Run Tests
        run: pytest

      - name: Build Docker Image
        run: docker build -t mousebase-backend .
