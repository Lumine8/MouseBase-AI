name: Backend CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16

        env:
          POSTGRES_DB: mousebase
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/mousebase

      GEMINI_API_KEY: test

      EMBEDDING_MODEL: text-embedding-004
      EMBEDDING_DIMENSIONS: 768

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Install dev dependencies
        run: |
          pip install black ruff pytest pytest-asyncio pytest-cov httpx

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest
